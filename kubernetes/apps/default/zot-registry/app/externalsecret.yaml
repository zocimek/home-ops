---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretName zot-users
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *secretName
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Concatenated htpasswd file mounted at /secrets/users/htpasswd.
        # Each field in 1Password holds one full htpasswd line
        # (user:$2y$05$...).
        htpasswd: |-
          {{ .readonly_htpasswd }}
          {{ .github_htpasswd }}
          {{ .zocimek_htpasswd }}
  dataFrom:
    - extract:
        key: zot

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secretName zot-registry-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *secretName
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Basic <base64(readonly_username:readonly_password)>
        # Injected into the Helm values at `authHeader` so the chart can
        # set it as the Authorization header on the liveness/readiness
        # probes (zot has auth enabled and does not bypass health
        # endpoints).
        authHeader: 'Basic {{ printf "%s:%s" .readonly_username .readonly_password | b64enc }}'
  dataFrom:
    - extract:
        key: zot
