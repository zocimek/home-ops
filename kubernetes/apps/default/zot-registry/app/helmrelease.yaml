---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zot-registry
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: zot
      version: 0.1.104
      sourceRef:
        kind: HelmRepository
        name: zot-registry
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  valuesFrom:
    - kind: Secret
      name: zot-registry-secret
      valuesKey: authHeader
      targetPath: authHeader
  values:
    fullnameOverride: *app
    image:
      repository: ghcr.io/project-zot/zot-linux-amd64
    service:
      type: ClusterIP
    strategy:
      type: Recreate

    # Ingress disabled — we use Gateway API (HTTPRoute) in this cluster.
    ingress:
      enabled: false

    startupProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 60

    # pod-level securityContext (sysctls belong here per the pod spec)
    podSecurityContext:
      sysctls:
        - name: fs.inotify.max_user_instances
          value: "512"
        - name: fs.inotify.max_user_watches
          value: "524288"

    # container-level securityContext
    securityContext:
      capabilities:
        add:
          - SYS_RESOURCE

    mountConfig: true
    configFiles:
      # retention policy tuned to our release scheme (mirrors poetica PR #568):
      #   X.Y.Z        -> keep 3 most recent
      #   X.Y.Z-rc.*   -> keep 2 most recent
      #   X.Y.Z-alpha.* -> keep 1 most recent
      #   everything else -> kept only if pulled within 24h
      # cosign signatures pruned via deleteReferrers
      config.json: |-
        {
          "storage": {
            "dedupe": false,
            "remoteCache": false,
            "rootdirectory": "/var/lib/registry",
            "gc": true,
            "gcDelay": "1h",
            "gcInterval": "1h",
            "retention": {
              "dryRun": false,
              "delay": "2h",
              "policies": [
                {
                  "repositories": ["docker.io/**"],
                  "deleteReferrers": true,
                  "deleteUntagged": true,
                  "keepTags": [
                    { "pulledWithin": "720h" }
                  ]
                },
                {
                  "repositories": ["**"],
                  "deleteReferrers": true,
                  "deleteUntagged": true,
                  "keepTags": [
                    { "patterns": ["^[0-9]+\\.[0-9]+\\.[0-9]+$"],            "mostRecentlyPushedCount": 3 },
                    { "patterns": ["^[0-9]+\\.[0-9]+\\.[0-9]+-rc\\..*$"],    "mostRecentlyPushedCount": 2 },
                    { "patterns": ["^[0-9]+\\.[0-9]+\\.[0-9]+-alpha\\..*$"], "mostRecentlyPushedCount": 1 },
                    { "patterns": [".*"],                                    "pulledWithin": "24h" }
                  ]
                }
              ]
            }
          },
          "extensions": {
            "search":  { "enable": true, "cve": { "updateInterval": "24h" } },
            "trust":   { "enable": true, "cosign": true, "notation": false },
            "scrub":   { "enable": true, "interval": "24h" },
            "ui":      { "enable": true },
            "lint":    { "enable": true },
            "sync": {
              "enable": true,
              "registries": [
                {
                  "urls": ["https://registry-1.docker.io"],
                  "onDemand": true,
                  "tlsVerify": true,
                  "content": [
                    { "prefix": "**", "destination": "/docker.io" }
                  ]
                }
              ]
            }
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "externalUrl": "https://registry.pospiech.dev",
            "auth": {
              "htpasswd": { "path": "/secrets/users/htpasswd" }
            },
            "accessControl": {
              "repositories": {
                "**": {
                  "policies": [
                    { "users": ["readonly"], "actions": ["read"] },
                    { "users": ["github"],   "actions": ["read", "create", "update"] }
                  ],
                  "defaultPolicy": ["read"]
                }
              },
              "adminPolicy": {
                "users": ["zocimek"],
                "actions": ["read", "create", "update", "delete"]
              }
            }
          },
          "log": { "level": "info" }
        }

    persistence: true
    pvc:
      create: true
      accessMode: ReadWriteOnce
      storage: 50Gi
      storageClass: ceph-block

    externalSecrets:
      - secretName: zot-users
        mountPath: /secrets/users
