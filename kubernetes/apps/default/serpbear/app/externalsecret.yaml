---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app serpbear
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *app
    template:
      engineVersion: v2
      data:
        USER_NAME: "{{.USER_NAME}}"
        PASSWORD: "{{.PASSWORD}}"
        SECRET: "{{.SECRET}}"
        APIKEY: "{{.APIKEY}}"
  dataFrom:
    - extract:
        key: serpbear
